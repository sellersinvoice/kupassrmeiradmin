<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-white shadow-md flex flex-col">

    <div class="p-6 font-bold text-xl border-b">
      Admin Panel
    </div>

    <nav id="sidebarNav" class="flex-1 p-4 space-y-2 text-sm"></nav>

  </aside>

  <!-- MAIN -->
  <main class="flex-1 flex flex-col">

    <!-- TOP BAR -->
    <header class="bg-white shadow px-6 py-4 flex justify-between items-center">

      <h1 id="pageTitle" class="text-2xl font-bold">
        Dashboard
      </h1>

      <div class="flex items-center gap-2">
        <button id="addUserGlobalBtn"
          class="bg-amber-600 text-white px-4 py-2 rounded hidden">
          Add User
        </button>

        <button id="addRoleGlobalBtn"
          class="border px-4 py-2 rounded hidden">
          Add Role
        </button>

        <button id="exportImageBtn"
          class="border px-4 py-2 rounded hidden">
          🖼️
        </button>

        <button id="exportPdfBtn"
          class="border px-4 py-2 rounded hidden">
          📄
        </button>
        <button id="globalRefreshBtn"
          class="bg-amber-600 text-white px-4 py-2 rounded hidden">
          Refresh
        </button>

        <div id="authArea">

          <!-- logged out -->
          <button
            id="loginBtn"
            class="border border-gray-300 text-gray-700 hover:bg-gray-100 px-4 py-2 rounded-xl transition"
          >
            Login
          </button>

          <!-- logged in -->
          <div
            id="userBox"
            class="hidden items-center gap-2 bg-gray-100 px-3 py-2 rounded-xl"
          >
            <span id="userName" class="text-sm text-gray-700"></span>

            <button
              id="logoutBtn"
              class="text-xs bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded"
            >
              Logout
            </button>
          </div>

        </div>
      </div>

    </header>

    <!-- CONTENT -->
        <div id="contentArea" class="p-6 flex flex-col gap-4 flex-1 overflow-auto">

        <!-- MODULE CONTENT -->
        <div id="moduleContent" class="flex-1">
            <div class="text-gray-500">Select a section</div>
        </div>

        </div>

  </main>

</div>

<!-- STYLES -->
<style>
.nav-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 10px 12px;
  border-radius: 8px;
}

.nav-btn:hover {
  background-color: #f3f4f6;
}

.nav-btn.active {
  background-color: #f59e0b;
  color: white;
}
</style>

<!-- MAIN SCRIPT -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module" src="./js/adminApp.js"></script>


</body>
</html>
